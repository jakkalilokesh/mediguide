apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mediguide-netpol
  namespace: mediguide
spec:
  podSelector:
    matchLabels:
      app: mediguide
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress on HTTP port 5000 from any pod in the cluster
    # (specifically ALB targets or ingress-nginx targets)
    - ports:
        - protocol: TCP
          port: 5000
  egress:
    # Allow Egress to DNS servers (kube-dns/CoreDNS usually in kube-system)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Egress to external internet (TCP 443) for third-party LLM APIs (Groq, OpenAI, Google, Deepseek)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
