apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

resources:
  - external-secret.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policy.yaml

# Patch base ServiceAccount to bind it to the EKS IRSA role ARN generated by Terraform
patches:
  - target:
      kind: ServiceAccount
      name: mediguide-sa
    patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: mediguide-sa
        annotations:
          # REPLACE WITH ACTUAL ROLE ARN PROVISIONED BY TERRAFORM:
          eks.amazonaws.com/role-arn: "arn:aws:iam::xxxxxxxxxxxx:role/mediguide-external-secrets"
