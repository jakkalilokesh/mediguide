apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mediguide-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/mediguide/mediguide.git'
    targetRevision: HEAD
    path: infrastructure/k8s/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mediguide
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
